version: '3.8'

services:
  radio432-nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - radio432-api
    networks:
      - radio432-net

  radio432-api:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: node server.js
    volumes:
      - ./backend:/app
      - radio432-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/data/radio432.db
      - CF_ACCESS_TEAM_DOMAIN=matzeclaudi.cloudflareaccess.com
    networks:
      - radio432-net

  radio432-tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - radio432-nginx
    networks:
      - radio432-net

volumes:
  radio432-data:

networks:
  radio432-net:
    driver: bridge
