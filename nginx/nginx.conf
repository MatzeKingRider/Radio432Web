events { worker_processes 1; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name radio.claudimatze.online;
        root /usr/share/nginx/html;
        index index.html;

        # API-Anfragen an Node.js Backend weiterleiten
        location /api/ {
            proxy_pass http://radio432-api:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Access-Authenticated-User-Email $http_cf_access_authenticated_user_email;
        }

        # SPA: alle anderen Routen zur index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # PWA: Service Worker darf nicht gecacht werden
        location /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Statische Assets: lang cachen
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
